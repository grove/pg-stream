name: 'dbt_pgtrickle_integration_tests'
version: '0.1.0'
config-version: 2

profile: 'integration_tests'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]

seeds:
  dbt_pgtrickle_integration_tests:
    raw_orders:
      +post-hook: |
        DO $$
        BEGIN
          IF NOT EXISTS (
            SELECT 1
            FROM pg_constraint
            WHERE conrelid = to_regclass('{{ this }}')
              AND contype = 'p'
          ) THEN
            EXECUTE 'ALTER TABLE {{ this }} ADD PRIMARY KEY (id)';
          END IF;
        END
        $$;

clean-targets:
  - "target"
  - "dbt_packages"
