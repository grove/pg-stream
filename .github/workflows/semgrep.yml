# =============================================================================
# Semgrep Workflow — repository-specific static checks for extension security
# hotspots such as dynamic SPI SQL and SECURITY DEFINER SQL.
#
# This first pass is advisory: findings are uploaded as SARIF but do not fail
# CI yet. That keeps the initial rollout useful without immediately blocking on
# the existing dynamic-SPI surface area.
# =============================================================================
name: Semgrep

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'sql/**'
      - '.semgrep/**'
      - '.github/workflows/semgrep.yml'
  # No pull_request trigger: Semgrep rules are advisory-only and won't block
  # a merge, so running on every PR provides no gate value. Weekly schedule
  # + push-to-main covers main-branch drift.
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep

      - name: Run Semgrep ruleset
        # Advisory-only: upload findings as SARIF but do not block CI.
        # Semgrep exits with code 2 when blocking findings exist; continue-on-error
        # prevents that from failing the job while still uploading the SARIF report.
        continue-on-error: true
        run: semgrep scan --config .semgrep/pg_trickle.yml --sarif --output semgrep.sarif

      - name: Filter suppressed findings from SARIF
        # Semgrep 1.x includes nosemgrep-suppressed results in SARIF output with
        # suppressions:[{kind:"inSource"}] metadata.  GitHub Code Scanning does NOT
        # auto-dismiss alerts based on SARIF suppressions unless a repository-level
        # setting is enabled.  Strip suppressed results here so GitHub only ever
        # receives the genuine (unacknowledged) findings and will auto-close alerts
        # for locations that are covered by a nosemgrep comment.
        run: |
          python3 - <<'EOF'
          import json, sys
          data = json.load(open("semgrep.sarif"))
          for run in data["runs"]:
              before = len(run["results"])
              run["results"] = [r for r in run["results"] if not r.get("suppressions")]
              after = len(run["results"])
              print(f"SARIF: removed {before - after} suppressed result(s), {after} remain", file=sys.stderr)
          json.dump(data, open("semgrep.sarif", "w"))
          EOF

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
