# =============================================================================
# Unsafe Inventory Workflow — enforce that unsafe block count does not grow.
#
# Counts `unsafe {` blocks per .rs file and compares against the committed
# baseline in .unsafe-baseline.
#
# Trigger behaviour:
#   PRs and pushes to main: regressions FAIL the build (--strict mode).
#   This enforces O40-6: unsafe-inventory is a real PR gate, not advisory.
#
# To update the baseline after a justified unsafe addition:
#   scripts/unsafe_inventory.sh --update > .unsafe-baseline
#   git add .unsafe-baseline && git commit -m "chore: update unsafe baseline"
# =============================================================================
name: Unsafe inventory

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.unsafe-baseline'
      - 'scripts/unsafe_inventory.sh'
      - '.github/workflows/unsafe-inventory.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '.unsafe-baseline'
      - 'scripts/unsafe_inventory.sh'
      - '.github/workflows/unsafe-inventory.yml'
  schedule:
    - cron: '15 9 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unsafe-inventory:
    name: Unsafe block inventory
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Run unsafe inventory
        run: |
          chmod +x scripts/unsafe_inventory.sh
          # Strict mode — regressions fail the build (O40-6: real PR gate).
          # Remove --report-only that was present before v0.40.0.
          scripts/unsafe_inventory.sh
