name: Docs drift check

on:
  push:
    branches: [main]
    paths:
      - 'src/config.rs'
      - 'src/**/*.rs'
      - 'docs/**/*.md'
      - 'docs/GUC_CATALOG.md'
      - 'docs/SQL_API_CATALOG.md'
      - 'scripts/gen_catalogs.py'
      - '.github/workflows/docs-drift.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/config.rs'
      - 'src/**/*.rs'
      - 'docs/**/*.md'
      - 'docs/GUC_CATALOG.md'
      - 'docs/SQL_API_CATALOG.md'
      - 'scripts/gen_catalogs.py'
      - '.github/workflows/docs-drift.yml'
  schedule:
    - cron: '30 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs-drift:
    name: GUC and SQL API catalog drift check (O40-1)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check GUC and SQL API catalogs are up to date
        run: |
          python3 scripts/gen_catalogs.py --check

      - name: Stale-term docs lint (A42-4)
        run: |
          set -euo pipefail
          RETIRED_TERMS=("pg_trickle.max_workers" "pg_trickle.max_parallel_refresh_workers")
          EXCLUDE_PATTERN="deprecated|compat|appendix|Compatibility|Deprecated"
          FAIL=0
          for TERM in "${RETIRED_TERMS[@]}"; do
            while IFS= read -r match; do
              if ! echo "$match" | grep -qiE "$EXCLUDE_PATTERN"; then
                echo "FAIL: retired term '$TERM' found: $match"
                FAIL=1
              fi
            done < <(grep -rn "$TERM" docs/ 2>/dev/null || true)
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "docs-lint FAILED: retired GUC names found in active doc sections."
            exit 1
          fi
          echo "docs-lint passed"
