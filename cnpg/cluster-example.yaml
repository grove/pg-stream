# =============================================================================
# Example CloudNativePG Cluster with pg_trickle via Image Volume Extensions.
#
# This uses the official CNPG minimal PostgreSQL 18 operand image with the
# pg_trickle extension mounted as an ImageVolume. The extension image is a
# scratch-based OCI image containing only the .so, .control, and .sql files.
#
# Prerequisites:
#   1. Kubernetes 1.33+ with ImageVolume feature gate enabled
#   2. CNPG operator 1.28+ installed
#   3. pg_trickle-ext image available in the cluster registry
#
# Health Monitoring:
#   CNPG manages liveness/readiness probes via its instance manager.
#   For pg_trickle-specific health, query the built-in health_check():
#     SELECT * FROM pgtrickle.health_check();
#   Expose pg_trickle metrics to Prometheus via the CNPG monitoring
#   integration — see docs/GETTING_STARTED.md § Kubernetes Deployment.
#
# Deploy:
#   kubectl apply -f cnpg/cluster-example.yaml
#   kubectl apply -f cnpg/database-example.yaml
#
# Connect:
#   kubectl exec -it pg-trickle-demo-1 -- psql -U postgres -d app
#
# See: https://cloudnative-pg.io/docs/1.28/imagevolume_extensions/
# =============================================================================
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-trickle-demo
  labels:
    app.kubernetes.io/name: pg-trickle
    app.kubernetes.io/component: database
spec:
  # Number of PostgreSQL instances (1 primary + N-1 replicas)
  instances: 3

  # Use the official CNPG minimal PostgreSQL 18 operand image.
  # The pg_trickle extension is loaded via Image Volumes below —
  # no custom PostgreSQL image is needed.
  imageName: ghcr.io/cloudnative-pg/postgresql:18

  postgresql:
    # Required: load the extension shared library at server start
    shared_preload_libraries:
      - pg_trickle

    # Extension image — mounted at /extensions/pg-trickle/
    # CNPG automatically configures:
    #   extension_control_path → /extensions/pg-trickle/share
    #   dynamic_library_path   → /extensions/pg-trickle/lib
    extensions:
      - name: pg-trickle
        image:
          reference: ghcr.io/<owner>/pg_trickle-ext:<version>

    parameters:
      # Recommended: scheduler bgworker + refresh workers
      max_worker_processes: "8"

      # Optional: tune scheduler interval (default: 1000ms)
      # pg_trickle.scheduler_interval_ms: "1000"

      # Optional: tune minimum schedule duration (default: 60s)
      # pg_trickle.min_schedule_seconds: "60"

  bootstrap:
    initdb:
      database: app
      owner: app
      # Extension creation is handled declaratively by the Database resource
      # (see cnpg/database-example.yaml). No postInitSQL needed.

  # ── Probe Configuration ──────────────────────────────────────────────────
  # Tuned for pg_trickle workloads: background workers and refresh cycles
  # can cause brief CPU spikes, so give probes generous timeouts.
  probes:
    startup:
      # pg_trickle registers background workers at startup. Allow extra time
      # for shared_preload_libraries initialization.
      periodSeconds: 10
      failureThreshold: 60   # 10 minutes max startup
    liveness:
      periodSeconds: 10
      failureThreshold: 6    # 60 seconds before restart
      timeoutSeconds: 5
    readiness:
      # Replicas must be streaming before receiving read traffic.
      # pg_trickle stream tables are readable on replicas, but stale
      # replicas would serve outdated data.
      type: streaming
      maximumLag: 64Mi
      periodSeconds: 10
      failureThreshold: 3

  storage:
    size: 10Gi
    # Replace with your cluster's storage class
    storageClass: standard

  # Optional: resource limits (recommended for production)
  # The scheduler and parallel refresh workers share max_worker_processes.
  # Budget: 1 scheduler + N refresh workers + standard PG workers.
  # resources:
  #   requests:
  #     memory: 512Mi
  #     cpu: 500m
  #   limits:
  #     memory: 2Gi
  #     cpu: 2000m

  # Optional: backup configuration (recommended for production)
  # backup:
  #   barmanObjectStore:
  #     destinationPath: s3://your-bucket/cnpg-backups
  #     s3Credentials:
  #       accessKeyId:
  #         name: cnpg-s3-creds
  #         key: ACCESS_KEY_ID
  #       secretAccessKey:
  #         name: cnpg-s3-creds
  #         key: ACCESS_SECRET_KEY
